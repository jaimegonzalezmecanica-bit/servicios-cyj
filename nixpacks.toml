# Railway deployment configuration - Nixpacks
[phases.setup]
nixPkgs = ["...", "openssl"]

[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
cmds = ["npx prisma generate", "npx next build"]

[phases.start]
cmd = "node .next/standalone/server.js"

[variables]
NODE_ENV = "production"
HOSTNAME = "0.0.0.0"
PORT = "3000"
DATABASE_URL = "file:/app/data/custom.db"
